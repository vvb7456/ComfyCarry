<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComfyCarry - 部署向导</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // 主题初始化 — 在 <head> 中内联执行以防止闪烁
        (function() {
            function getTheme() { return localStorage.getItem('theme') || 'system'; }
            function applyTheme(pref) {
                var isDark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.dataset.theme = isDark ? '' : 'light';
            }
            applyTheme(getTheme());
            matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
                if (getTheme() === 'system') applyTheme('system');
            });
        })();
    </script>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="./src/wizard-main.ts"></script>
</body>

</html>
