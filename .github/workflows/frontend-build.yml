# ==============================================================================
# Frontend 构建 & 发布 (GitHub Actions)
#
# 触发: push 到 main 分支且 frontend/ 目录有变化，或手动触发
# 流程: npm ci → npm run build → 打包 static/dist/ → 上传到 GitHub Release
# 目的: bootstrap.sh 从 Release 下载前端构建产物，仓库不再包含 dist
# ==============================================================================

name: Build Frontend

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
    branches: [main]
  workflow_dispatch:  # 手动触发

env:
  RELEASE_TAG: frontend-dist  # 滚动 Release tag

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Package dist
        run: tar -czf frontend-dist.tar.gz -C static dist

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Frontend Dist (auto-built)"
          body: |
            自动构建的前端产物，由 `frontend-build.yml` 生成。
            bootstrap.sh 会从此 Release 下载 `frontend-dist.tar.gz`。

            构建时间: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            触发 commit: ${{ github.sha }}
          files: frontend-dist.tar.gz
          make_latest: false
          prerelease: true
